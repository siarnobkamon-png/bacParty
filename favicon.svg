<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffed4e"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0a0015"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#goldGrad)" stroke-width="2" filter="url(#glow)"/>
  <text x="50" y="45" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="url(#goldGrad)" filter="url(#glow)">DJ</text>
  <text x="50" y="65" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#a855f7" filter="url(#glow)">LIVE</text>
</svg>
